<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — İstanbul Yıldız Akademi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f6e56;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.kutu{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:2rem;}
.logo h1{font-size:22px;font-weight:700;color:#0f6e56;margin-bottom:4px;}
.logo p{font-size:13px;color:#5dcaa5;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;}
.fg label{font-size:12px;font-weight:600;color:#085041;}
.fg input{font-size:14px;padding:10px 12px;border-radius:8px;border:1.5px solid #9fe1cb;background:#f0faf6;color:#04342c;width:100%;}
.fg input:focus{outline:none;border-color:#0f6e56;background:#fff;}
.btn-giris{width:100%;padding:12px;background:#0f6e56;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:.5rem;}
.btn-giris:hover{background:#085041;}
.hata{background:#fcebeb;color:#a32d2d;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:1rem;text-align:center;}
.alt{text-align:center;margin-top:1.5rem;font-size:11px;color:#9fe1cb;}
</style>
</head>
<body>
<div class="kutu">
  <div class="logo">
    <h1>🎓 İstanbul Yıldız Akademi</h1>
    <p>Yönetim Sistemi</p>
  </div>
  {% if hata %}
  <div class="hata">{{ hata }}</div>
  {% endif %}
  <form method="POST">
    <div class="fg">
      <label>Kullanıcı Adı</label>
      <input type="text" name="kullanici" placeholder="Kullanıcı adınızı girin" autofocus required>
    </div>
    <div class="fg">
      <label>Şifre</label>
      <input type="password" name="sifre" placeholder="Şifrenizi girin" required>
    </div>
    <button type="submit" class="btn-giris">Giriş Yap</button>
  </form>
  <div class="alt">İstanbul Yıldız Akademi © 2025</div>
</div>
</body>
</html>
